# Production hardening override.
# Use with:
#   docker compose -f docker-compose.yml -f deploy/docker/docker-compose.localhost-ports.yml up -d --build
#
# This keeps the frontend/backend/database/cache reachable from the VPS itself,
# but stops them from being exposed directly on the public network interface.

services:
  db:
    ports: !override
      - "127.0.0.1:5432:5432"

  redis:
    ports: !override
      - "127.0.0.1:6379:6379"

  backend:
    environment:
      ALLOWED_HOSTS: 102.212.245.79,localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://102.212.245.79
    ports: !override
      - "127.0.0.1:8000:8000"

  web:
    build:
      args:
        NEXT_PUBLIC_API_URL: ""
    environment:
      NEXT_PUBLIC_API_URL: ""
    ports: !override
      - "127.0.0.1:3000:3000"
